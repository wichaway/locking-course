  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-size:34px; color:var(--violet-hi); display:block; line-height:1;}\n  .stat-strip small{font-size:13px; color:var(--ink-faint); letter-spacing:.05em;}\n  @media(max-width:640px){.stage-frame img{height:300px;} .stat-strip{flex-wrap:wrap;} .stat-strip>div{padding:20px 26px;}}\n\n  /* INTRO */\n  section.band{padding:110px 0;}\n  .kicker{font-size:12.5px; letter-spacing:.3em; text-transform:uppercase; color:var(--violet-hi); font-weight:700; margin-bottom:16px;}\n  h2{font-family:var(--display); font-size:clamp(36px,5vw,66px); line-height:1.0; letter-spacing:-.01em;}\n  .intro{background:var(--bg-2); border-block:1px solid var(--line); text-align:center;}\n  .intro p.big{font-size:clamp(19px,2.2vw,26px); font-weight:300; color:var(--ink-soft); max-width:60ch; margin:26px auto 0;}\n  .intro p.big b{color:var(--ink); font-weight:500;}\n\n  /* SYLLABUS GRID */\n  .syl-head{text-align:center; margin-bottom:18px;}\n  .filters{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:30px 0 48px;}\n  .chip{font-size:14px; font-weight:500; color:var(--ink-soft); padding:9px 20px; border-radius:100px;\n    border:1px solid var(--line); cursor:pointer; transition:.2s; background:transparent;}\n  .chip:hover{color:var(--ink); border-color:var(--ink-faint);}\n  .chip.active{background:var(--violet); color:#fff; border-color:var(--violet);}\n  .grid{display:grid; grid-template-columns:repeat(4,1fr); gap:18px;}\n  .lcard{position:relative; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:26px 22px 24px;\n    min-height:176px; display:flex; flex-direction:column; overflow:hidden; transition:transform .3s, border-color .3s, opacity .35s;}\n  .lcard::before{content:\"\"; position:absolute; inset:0 auto 0 0; width:3px; background:var(--violet); opacity:0; transition:.3s;}\n  .lcard:hover{transform:translateY(-6px); border-color:color-mix(in oklab,var(--violet) 60%,var(--line));}\n  .lcard:hover::before{opacity:1;}\n  .lcard .num{font-fami :var(--ink-faint); font-size:13.5px;}\n  .reveal{opacity:1; transform:none;}\n  @media (prefers-reduced-motion: no-preference){\n    .js .reveal{opacity:0; transform:translateY(26px); transition:opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1);}\n    .js .reveal.in{opacity:1; transform:none;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<nav>\n  <div class=\"wrap nav-in\">\n    <a class=\"brand\" href=\"#\"><b>LOCK'IN<\u002Fb><span>STYLE<\u002Fspan><\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#about\">על הקורס<\u002Fa>\n      <a href=\"#syllabus\">16 השיעורים<\u002Fa>\n      <a href=\"#enroll\">הרשמה<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"#enroll\" class=\"btn\">להרשמה<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<header class=\"hero\">\n  <div class=\"spot\"><\u002Fdiv>\n  <div class=\"inner wrap\">\n    <span class=\"tagline\">קורס לוקינג · מחזור חדש נפתח<\u002Fspan>\n    <h1 class=\"title\">LOCK<em>'<\u002Fem>IN<\u002Fh1>\n    <p class=\"lede\">16 שיעורים שלוקחים אותך מההיסטוריה של הפאנק עד לפריסטייל שהוא רק שלך. זה לא קורס ריקוד — זו כניסה לתרבות.<\u002Fp>\n    <div class=\"hero-cta\">\n      <a href=\"#enroll\" class=\"btn\">שריון מקום במחזור<\u002Fa>\n      <a href=\"#syllabus\" class=\"btn btn-ghost\">לתכנית המלאה<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stage\">\n    <div class=\"stage-frame\">\n      <img src=\"7f5238a8-ec82-4947-960a-749650c2de1f\" alt=\"מדריך הקורס\">\n      <div class=\"cover-panel\">\n        <div class=\"cp-kicker\">16 שיעורים<\u002Fdiv>\n        <h3>קורס לוקינג<\u002Fh3>\n        <ol class=\"cp-list\" id=\"cpList\"><\u002Fol>\n      <\u002Fdiv>\n      <div class=\"stage-cap\"><b>הסגנון מתחיל באדם<\u002Fb><small>מדריך הקורס · LOCK'IN STYLE<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"stat-strip\">\n  <div><b>16<\u002Fb><small>שיעורים מובנים<\u002Fsmall><\u002Fdiv>\n  <div><b>4<\u002Fb><small>שלבי התקדמות<\u002Fsmall><\u002Fdiv>\n  <div><b>1972<\u002Fb><small>שורשי הלוקינג<\u002Fsmall><\u002Fdiv>\n  <div><b>∞<\u002Fb><small>פריסטייל אישי<\u002Fsmall><\u002Fdiv>\n<\u002Fdiv>\n\n<section class=\"band intro\" id=\"about\">\n  <div class=\"wrap reveal\">\n    <p class=\"kicker\">למה לוקינג<\u002Fp>\n    <h2>הסגנון שהמציא את הביטחון.<\u002Fh2>\n    <p class=\"big\"><b>לוקינג נולד מתוך הפאנק — מתוך הקצב, ההומור והנוכחות.<\u002Fb> בקורס בונים אותך שכבה אחר שכבה: מהבסיס הקאמבלי, דרך מוזיקליות ועבודת רגליים, ועד לכוריאוגרפיה ופריסטייל שמרגישים כמו חתימה אישית.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"band\" id=\"syllabus\">\n  <div class=\"wrap\">\n    <div class=\"syl-head reveal\">\n      <p class=\"kicker\">תכנית הקורס<\u002Fp>\n      <h2>16 השיעורים<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"filters reveal\" id=\"filters\"><\u002Fdiv>\n    <div class=\"grid\" id=\"grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"band enroll\" id=\"enroll\">\n  <div class=\"spot2\"><\u002Fdiv>\n  <div class=\"inner wrap reveal\">\n    <p class=\"kicker\">הרשמה<\u002Fp>\n    <h2>הספוט שלך מחכה.<\u002Fh2>\n    <p class=\"lede2\">מקומות מוגבלים בכוונה — קבוצה קטנה, יחס אישי, מחזור אחד.<\u002Fp>\n    <div class=\"pricebar\"><span class=\"price\">₪<span class=\"ph\">מחיר<\u002Fspan><\u002Fspan><span class=\"ph\">פרטי תשלום<\u002Fspan><\u002Fdiv>\n    <div class=\"enroll-cta\">\n      <a href=\"#\" class=\"btn\">שריון מקום<\u002Fa>\n      <a href=\"#\" class=\"btn btn-ghost\">דברו איתנו בוואטסאפ<\u002Fa>\n    <\u002Fdiv>\n    <small class=\"note\">תאריכים · מיקום · פרטי מחזור — <span class=\"ph\">להשלמה<\u002Fspan><\u002Fsmall>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"wrap foot-in\">\n    <a class=\"brand\" href=\"#\"><b>LOCK'IN<\u002Fb><span>STYLE<\u002Fspan><\u002Fa>\n    <small>קורס לוקינג · כל הזכויות שמורות © 2026<\u002Fsmall>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  const phases = [\"יסודות\",\"טכניקה\",\"פיתוח\",\"ביטוי\"];\n  const lessons = [\n    [\"היסטוריה + לוקינג כתפיסה תנועתית\",\"שורש התרבות\",0],\n    [\"קאמבל לוקינג\",\"הבסיס\",0],\n    [\"Feel & Groove\",\"להיות פאנקי\",0],\n    [\"קאמבל לוקינג + Feel & Groove\",\"חיבור ראשון\",0],\n    [\"עבודת רגליים + צעדים\",\"בסיס\",1],\n    [\"מוזיקליות בלוקינג\",\"להקשיב לביט\",1],\n    [\"עבודת רגליים + צעדים\",\"מתקדם\",1],\n    [\"עבודת ריצפה\",\"דיוק ושליטה\",1],\n    [\"ווריאציות\",\"אוצר תנועה\",2],\n    [\"תנועה בחלל\",\"נוכחות על הרחבה\",2],\n    [\"רצפים + עבודה בזוגות\",\"שליטה בזמן\",2],\n    [\"לוק & פופ\",\"ההקשר לפאנק\",2],\n    [\"כוריאוגרפיה\",\"לבנות יצירה\",3],\n    [\"פריסטייל\",\"השפה האישית\",3],\n    [\"לוקינג מתקדם\",\"הרמה הגבוהה\",3],\n    [\"סיכום\",\"הופעת הגמר\",3],\n  ];\n  const grid = document.getElementById('grid');\n  lessons.forEach((l,i)=>{\n    const n=String(i+1).padStart(2,'0');\n    const c=document.createElement('div');\n    c.className='lcard'; c.dataset.phase=l[2];\n    c.innerHTML=`<span class=\"pdot\">${phases[l[2]]}<\u002Fspan><span class=\"num\">שיעור ${n}<\u002Fspan><h3>${l[0]}<\u002Fh3><span class=\"tag\">${l[1]}<\u002Fspan>`;\n    grid.appendChild(c);\n  });\n  const cpList=document.getElementById('cpList');\n  lessons.forEach(l=>{const li=document.createElement('li'); li.textContent=l[0]; cpList.appendChild(li);});\n  const fz=document.getElementById('filters');\n  const mk=(label,val)=>{const b=document.createElement('button'); b.className='chip'+(val==='all'?' active':''); b.textContent=label; b.dataset.f=val; fz.appendChild(b); return b;};\n  mk('הכל','all'); phases.forEach((p,i)=>mk(p,i));\n  fz.addEventListener('click',e=>{\n    const b=e.target.closest('.chip'); if(!b)return;\n    fz.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); b.classList.add('active');\n    const f=b.dataset.f;\n    grid.querySelectorAll('.lcard').forEach(c=>c.classList.toggle('dim', f!=='all' && c.dataset.phase!==f));\n  });\n  document.documentElement.classList.add('js');\n  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in'); io.unobserve(e.target);}}),{threshold:.12});\n  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n  setTimeout(()=>document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in')),1500);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
